name: CI Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Lint shell scripts
      run: |
        echo "Checking shell script syntax..."
        find . -name "*.sh" -exec shellcheck {} \; || true
        
    - name: Check Python syntax
      run: |
        echo "Checking Python syntax..."
        python3 -m py_compile vibe_custom_commands.py || true
        python3 -m py_compile load_vibe_extensions.py || true
        
  
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install UV
      uses: astral-sh/setup-uv@v1
      with:
        enable-cache: true
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck
        
        # Create virtual environment and install dependencies
        uv venv
        uv pip install pyyaml
        uv pip install -e .
        uv pip install pytest pytest-cov mypy ruff
        
    - name: Make scripts executable
      run: |
        find . -name "*.sh" -exec chmod +x {} \;
        chmod +x vibe-extended
        
    - name: Test install script
      run: |
        echo "Testing install script..."
        ./install.sh --help
        ./install.sh --version
        
        # Test with custom temp directory
        mkdir -p /tmp/test-install
        ./install.sh --dir /tmp/test-install --help
        test -f /tmp/test-install/README.md && echo "✓ Install script works" || echo "⚠ Install test file not found"
        
    - name: Test package creation
      run: |
        echo "Testing package creation..."
        ./package.sh tar.gz
        ls -la dist/
        
    - name: Run shell script tests
      run: |
        echo "Running shell script tests..."
        mkdir -p tests/coverage
        # Use uv run to execute in the virtual environment
        uv run ./tests/run_tests.sh --coverage
        
    - name: Run Python tests with coverage
      run: |
        echo "Running Python tests with coverage..."
        cd $GITHUB_WORKSPACE
        uv run pytest tests/python/ --cov=src --cov-report=term-missing --cov-report=xml:tests/coverage/pytest-coverage.xml
        
    - name: Run type checking with mypy
      run: |
        echo "Running type checking..."
        uv run mypy src/ --config-file mypy.ini
        
    - name: Run code formatting check with ruff
      run: |
        echo "Running code formatting check..."
        uv run ruff check src/ tests/python/
        
    - name: Verify created files
      run: |
        echo "Verifying created files..."
        test -f ~/.config/mistral_vibe/config.json && echo "✓ Config created"
        test -f ~/.config/mistral_vibe/agents/mistral-vibe.md && echo "✓ Agent created"
        test -f tests/test_report.txt && echo "✓ Shell test report created"
        test -f tests/coverage/coverage_report.txt && echo "✓ Shell coverage report created"
        test -f tests/coverage/pytest-coverage.xml && echo "✓ Python coverage report created"
        
    - name: Display test results
      run: |
        echo "Test Results:"
        cat tests/test_report.txt
        
    - name: Display coverage results
      run: |
        echo "Coverage Results:"
        cat tests/coverage/coverage_report.txt
        
    - name: Cleanup
      run: |
        rm -rf /tmp/test-install
        rm -rf dist/
        rm -rf tests/coverage
        
    - name: Success
      run: echo "✅ All CI tests passed!"
