name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install shellcheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck

    - name: Lint shell scripts
      run: find . -name "*.sh" -exec shellcheck {} \; || true

    - name: Check Python syntax
      run: |
        python3 -m py_compile src/vibe_custom_commands.py
        python3 -m py_compile src/load_vibe_extensions.py

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install UV
      uses: astral-sh/setup-uv@v1
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv venv
        uv pip install pyyaml
        uv pip install -e .
        uv pip install pytest pytest-cov mypy ruff

    - name: Make scripts executable
      run: |
        find . -name "*.sh" -exec chmod +x {} \;
        chmod +x vibe-extended

    - name: Run shell script tests
      run: |
        mkdir -p tests/coverage
        uv run ./tests/run_tests.sh --coverage

    - name: Run Python tests
      run: uv run pytest tests/python/ --cov=src --cov-report=term-missing

    - name: Type check
      run: uv run mypy src/ --config-file mypy.ini

    - name: Lint check
      run: uv run ruff check src/ tests/python/
