name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install UV
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync --dev

    - name: Lint shell scripts
      run: |
        sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck > /dev/null
        shellcheck install.sh setup_mistral_vibe.sh start_llm_server.sh \
          change_worker_model.sh toggle_hybrid_mode.sh sign_scripts.sh \
          package.sh setup_uv.sh tests/run_tests.sh test_python312.sh

    - name: Ruff lint
      run: uv run ruff check --output-format=github src/ tests/python/

    - name: Ruff format check
      run: uv run ruff format --check src/ tests/python/

    - name: Type check (mypy)
      run: make typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install UV
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync --dev

    - name: Make scripts executable
      run: chmod +x *.sh vibe-extended tests/run_tests.sh

    - name: Run shell script tests
      run: |
        sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck > /dev/null
        make test-shell

    - name: Run Python tests
      run: make test-python
