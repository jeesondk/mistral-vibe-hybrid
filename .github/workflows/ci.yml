name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  PROJECT_NAME: mistral-vibe-hybrid
  VERSION: 1.0.0

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        
    - name: Install dependencies with UV
      run: |
        sudo apt-get update
        sudo apt-get install -y curl git gnupg
        
        # Create and use a virtual environment with UV
        uv venv .venv
        source .venv/bin/activate
        
        # Install minimal dependencies and the package
        uv pip install pyyaml
        uv pip install -e .
        
    - name: Make scripts executable
      run: |
        # Activate virtual environment
        source .venv/bin/activate
        
        echo "Setting execute permissions..."
        find . -name "*.sh" -exec chmod +x {} \;
        chmod +x vibe-extended
        
        # Verify key scripts are executable
        echo "Verifying executable permissions:"
        test -x ./start_llm_server.sh && echo "✓ start_llm_server.sh" || (echo "❌ start_llm_server.sh not executable" && exit 1)
        test -x ./install.sh && echo "✓ install.sh" || (echo "❌ install.sh not executable" && exit 1)
        test -x ./package.sh && echo "✓ package.sh" || (echo "❌ package.sh not executable" && exit 1)
        test -x ./setup_mistral_vibe.sh && echo "✓ setup_mistral_vibe.sh" || (echo "❌ setup_mistral_vibe.sh not executable" && exit 1)
        
        # Verify Python package installation
        python -c "import src.vibe_custom_commands; print('✓ Python package imported successfully')" || echo "⚠ Python package import failed"
        
    - name: Test install script
      run: |
        echo "Testing install script..."
        # Test with custom temp directory
        ./install.sh --dir /tmp/test-install --help
        

        
    - name: Test script signing (simulated)
      run: |
        echo "Testing script signing..."
        # Test without actual GPG for CI
        ./sign_scripts.sh --help
        
    - name: Test setup script
      run: |
        # Activate virtual environment
        source .venv/bin/activate
        
        echo "Testing setup script..."
        # Create a minimal non-interactive test by creating required directories
        mkdir -p ~/.config/mistral_vibe/agents
        
        # Create dummy model file to avoid download prompt
        mkdir -p ~/models
        touch ~/models/dummy.gguf
        
        # Run setup with automatic responses
        # Answers: default path, skip download (n), select first model (1)
        echo -e "\n\nn\n1\n" | ./setup_mistral_vibe.sh
        
        # Verify setup created expected files
        if [ -f ~/.config/mistral_vibe/config.json ]; then
            echo "✓ Config file created"
        else
            echo "⚠ Config file not created (may be expected in CI)"
        fi
        
        if [ -f ~/.config/mistral_vibe/agents/mistral-vibe.md ]; then
            echo "✓ Agent file created"
        else
            echo "⚠ Agent file not created (may be expected in CI)"
        fi
        
    - name: Verify created files
      run: |
        echo "Verifying setup created files..."
        
        # Check if setup created config files
        if [ -f ~/.config/mistral_vibe/config.json ]; then
            echo "✓ Config file created by setup"
        else
            echo "⚠ Config file not created"
        fi
        
        if [ -f ~/.config/mistral_vibe/agents/mistral-vibe.md ]; then
            echo "✓ Primary agent file created by setup"
        else
            echo "⚠ Primary agent file not created"
        fi
        
        if [ -f ~/.config/mistral_vibe/agents/worker.md ]; then
            echo "✓ Worker agent file created by setup"
        else
            echo "⚠ Worker agent file not created"
        fi
        
        # Verify main scripts exist and are executable
        test -x ./start_llm_server.sh && echo "✓ LLM server script executable" || exit 1
        test -x ./change_worker_model.sh && echo "✓ Model changer script executable" || exit 1
        test -x ./toggle_hybrid_mode.sh && echo "✓ Toggle script executable" || exit 1
        
        echo "✅ Setup verification completed!"
        
    - name: Cleanup
      run: |
        echo "Cleaning up..."
        rm -rf /tmp/test-install || true
        echo "✓ Cleanup completed"
        
    - name: Success
      run: echo "✅ All CI tests passed!"
