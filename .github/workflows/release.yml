name: Release

on:
  push:
    tags:
      - 'v*'

env:
  PROJECT_NAME: mistral-vibe-hybrid

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install UV
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Extract version from tag
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Make scripts executable
      run: chmod +x *.sh vibe-extended

    - name: Create packages
      run: ./package.sh all --checksums

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: v${{ steps.version.outputs.VERSION }}
        tag_name: v${{ steps.version.outputs.VERSION }}
        generate_release_notes: true
        files: |
          dist/${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}-*.tar.gz
          dist/${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}-*.zip
          dist/checksums.txt
        draft: false
        prerelease: false
