name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, etc.)

env:
  PROJECT_NAME: mistral-vibe-hybrid

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        
    - name: Install dependencies with UV
      run: |
        sudo apt-get update
        sudo apt-get install -y curl git gnupg
        uv pip install -e .
        
    - name: Extract version from tag
      id: version
      run: |
        # Extract version from tag (v1.0.0 -> 1.0.0)
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Detected version: $VERSION"
        
    - name: Make scripts executable
      run: |
        find . -name "*.sh" -exec chmod +x {} \;
        chmod +x vibe-extended
        
    - name: Create packages
      run: |
        echo "Creating release packages..."
        ./package.sh all --checksums
        ls -la dist/
        
    - name: Create release notes
      id: release_notes
      run: |
        echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
        echo "🚀 Mistral Vibe Hybrid Setup v${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "## What's New" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "- Hybrid agent architecture (Mistral API + Local LLM)" >> $GITHUB_OUTPUT
        echo "- Vibe extension with custom commands" >> $GITHUB_OUTPUT
        echo "- Model management system" >> $GITHUB_OUTPUT
        echo "- Mode toggle (hybrid/single)" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "## Installation" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "```bash" >> $GITHUB_OUTPUT
        echo "curl -sSL https://raw.githubusercontent.com/your-repo/mistral-vibe-hybrid/main/install.sh | bash" >> $GITHUB_OUTPUT
        echo "```" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "## Downloads" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "- [tar.gz package](https://github.com/your-repo/mistral-vibe-hybrid/releases/download/v${{ steps.version.outputs.VERSION }}/${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}-$(date +%Y%m%d).tar.gz)" >> $GITHUB_OUTPUT
        echo "- [zip package](https://github.com/your-repo/mistral-vibe-hybrid/releases/download/v${{ steps.version.outputs.VERSION }}/${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}-$(date +%Y%m%d).zip)" >> $GITHUB_OUTPUT
        echo "- [checksums.txt](https://github.com/your-repo/mistral-vibe-hybrid/releases/download/v${{ steps.version.outputs.VERSION }}/checksums.txt)" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: v${{ steps.version.outputs.VERSION }}
        tag_name: v${{ steps.version.outputs.VERSION }}
        body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
        files: |
          dist/${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}-*.tar.gz
          dist/${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}-*.zip
          dist/checksums.txt
        draft: false
        prerelease: false
        
    - name: Success
      run: echo "✅ Release v${{ steps.version.outputs.VERSION }} created successfully!"
