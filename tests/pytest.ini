[pytest]
minversion = 7.0
addopts = --verbose --color=yes
testpaths = tests/python
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage configuration
addopts = --cov=src --cov-report=term-missing --cov-report=html:tests/coverage/html --cov-report=xml:tests/coverage/coverage.xml

# Type checking
mypy_addopts = --strict --ignore-missing-imports

# Logging
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

[tool:pytest]
junit_family = xunit2
